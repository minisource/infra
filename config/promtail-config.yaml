# Promtail Configuration
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
            container_id: attrs.container_id
      - regex:
          expression: ^/var/lib/docker/containers/(?P<container_id>[^/]+)/.*$
          source: filename
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: output
      - labels:
          stream:
          container_id:

  # Auth service logs
  - job_name: auth-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          service: auth
          __path__: /var/log/minisource/auth/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            trace_id: trace_id
      - labels:
          level:
          trace_id:

  # Notifier service logs
  - job_name: notifier-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: notifier
          service: notifier
          __path__: /var/log/minisource/notifier/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            trace_id: trace_id
      - labels:
          level:
          trace_id:
